<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Politics — Profile</title>
  <style>
    :root { --ink:#1a1a2e; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; margin:0; background:#f7f8fa; color:var(--ink); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
    .brand { font-size: 13px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); font-weight:700; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; margin-top:14px; }
    h1 { margin:.2em 0 0; font-size: 26px; }
    .meta { color:var(--muted); margin-top:4px; font-size:15px; }
    .tabs { display:flex; gap:8px; margin-top:18px; }
    .tab { padding:6px 12px; border-radius:999px; font-size:13px; border:1px solid var(--line); background:#fff; color:var(--muted); }
    .tab.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .tab.soon { opacity:.55; }
    .item { padding:14px 0; border-bottom:1px solid var(--line); }
    .item:last-child { border-bottom:0; }
    .date { font-variant-numeric: tabular-nums; color:var(--accent); font-weight:600; font-size:13px; }
    .bill { color:var(--muted); font-size:12px; margin-left:8px; }
    .title { margin:4px 0 2px; font-weight:600; }
    .action { color:var(--muted); font-size:13px; }
    .src { color:var(--muted); font-size:12px; margin-top:16px; }
    .phead { display:flex; gap:14px; align-items:center; }
    .photo { width:64px; height:64px; border-radius:12px; object-fit:cover; border:1px solid var(--line); flex:none; background:#eef; }
    .facts { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    .fact { font-size:13px; background:#f1f5ff; color:#1e3a8a; border:1px solid #dbe4ff; border-radius:999px; padding:5px 11px; }
    .fact b { font-weight:700; }
    a.fact { text-decoration:none; }
    a.fact:hover { background:#dbe4ff; }
    .contact { margin-top:12px; font-size:14px; color:var(--ink); }
    .contact div { margin-top:4px; }
    .contact a { color:var(--accent); text-decoration:none; }
    .sec-title { font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Pocket Politics</div>
    <a href="./explore.html" style="display:inline-block;margin-top:6px;font-size:14px;color:var(--accent);text-decoration:none">← All members</a>
    <div class="card" id="card">Loading profile…</div>
    <div class="sec-title" style="margin-top:22px">Web presence</div>
    <div class="card" id="web">Loading links…</div>
    <div class="sec-title" style="margin-top:22px">Campaign finance</div>
    <div class="card" id="money">Loading money…</div>
    <div class="sec-title" style="margin-top:22px">Bills currently in Congress</div>
    <div class="card" id="bills">Loading bills…</div>
  </div>
  <script>
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const fmt = d => esc(d) || "—";

    // Hit the shared backend API first (works on Cloudflare with the live record, or
    // the demo fixture when no key is set). Fall back to the static profile.json so the
    // plain `npm run demo` + `npm run serve` local flow keeps working with no backend.
    async function loadProfile() {
      try {
        const r = await fetch("/api/profile" + location.search);
        if (r.ok) return await r.json();
      } catch (_) { /* no backend (static serve) → fall through */ }
      return (await fetch("./profile.json")).json();
    }

    loadProfile().then(p => {
      if (p.error) throw new Error(p.error);
      const items = (p.record || []).map(r => `
        <div class="item">
          <span class="date">${fmt(r.date)}</span><span class="bill">${esc(r.id)}${r.policyArea ? " · " + esc(r.policyArea) : ""}</span>
          <div class="title">${esc(r.title)}</div>
          ${r.latestAction ? `<div class="action">${esc(r.latestAction)}</div>` : ""}
        </div>`).join("");
      const badge = p.live === false ? ` <span class="bill">· demo data</span>` : (p.live ? ` <span class="bill">· live</span>` : "");
      const c = p.contact || {};
      const photo = c.photo ? `<img class="photo" src="${esc(c.photo)}" alt="" onerror="this.style.display='none'">` : "";
      const pay = p.salary ? `<span class="fact">💵 <b>$${Number(p.salary.amount).toLocaleString()}</b>/yr · ${esc(p.salary.role)}</span>` : "";
      const contact = (c.office || c.phone || c.website) ? `
        <div class="contact">
          <div class="sec-title">Contact</div>
          ${c.office ? `<div>📍 ${esc(c.office)}</div>` : ""}
          ${c.phone ? `<div>📞 ${esc(c.phone)}</div>` : ""}
          ${c.website ? `<div>🔗 <a href="${esc(c.website)}" target="_blank" rel="noopener noreferrer">${esc(c.website)}</a></div>` : ""}
        </div>` : "";
      document.getElementById("card").innerHTML = `
        <div class="phead">${photo}<div>
          <h1>${esc(p.name)}${badge}</h1>
          <div class="meta">${esc(p.party)} · ${esc(p.state)} · ${esc(p.chamber)}</div>
        </div></div>
        <div class="facts">${pay}</div>
        ${contact}
        <div class="tabs">
          <span class="tab on">Past · record</span>
          <span class="tab soon">Present · votes (soon)</span>
          <span class="tab soon">Future · schedule (soon)</span>
        </div>
        <div style="margin-top:8px">${items || "<p>No records.</p>"}</div>
        <div class="src">Source: ${esc((p.sources||[]).join("; "))} · generated ${new Date(p.generatedAt).toLocaleString()}</div>`;
      // Web presence research: official site (from the profile) + social media, sourced from
      // the public @unitedstates dataset (keyed by bioguide). Graceful — if it fails, the
      // official site still shows.
      renderWebPresence(p);
      renderMoney(p.bioguideId);
    }).catch(e => { document.getElementById("card").textContent = "Could not load profile (" + e + ")"; });

    async function renderMoney(bioguide) {
      const el = document.getElementById("money");
      try {
        const m = await (await fetch("/api/money?bioguide=" + encodeURIComponent(bioguide))).json();
        if (!m.totals) { el.innerHTML = `<div class="meta">${esc(m.note || "No campaign-finance data.")}</div>`; return; }
        const usd = n => "$" + Number(n).toLocaleString();
        el.innerHTML = `<div class="facts">
            <span class="fact">💰 Raised <b>${usd(m.totals.raised)}</b></span>
            <span class="fact">💸 Spent <b>${usd(m.totals.spent)}</b></span>
            <span class="fact">🏦 Cash on hand <b>${usd(m.totals.cashOnHand)}</b></span>
          </div>
          <div class="src">${m.live === false ? "Demo data — set FEC_API_KEY for live. " : `Cycle ${esc(m.cycle)} · `}Source: ${esc(m.source)}</div>`;
      } catch (_) { el.innerHTML = `<div class="meta">Campaign finance unavailable.</div>`; }
    }

    const SOCIAL_DS = "https://unitedstates.github.io/congress-legislators/legislators-social-media.json";
    async function loadSocials(bioguide) {
      try {
        window.__socials = window.__socials || fetch(SOCIAL_DS).then(r => r.json());
        const all = await window.__socials;
        const rec = all.find(x => x.id && x.id.bioguide === bioguide);
        return rec ? rec.social : null;
      } catch (_) { return null; }
    }
    function socialLinks(s) {
      if (!s) return [];
      const L = [];
      if (s.twitter)   L.push(["𝕏 Twitter", "https://twitter.com/" + s.twitter]);
      if (s.facebook)  L.push(["Facebook", "https://facebook.com/" + s.facebook]);
      if (s.instagram) L.push(["Instagram", "https://instagram.com/" + s.instagram]);
      if (s.youtube)   L.push(["YouTube", "https://youtube.com/@" + s.youtube]);
      else if (s.youtube_id) L.push(["YouTube", "https://youtube.com/channel/" + s.youtube_id]);
      return L;
    }
    async function renderWebPresence(p) {
      const el = document.getElementById("web");
      const site = (p.contact || {}).website;
      const socials = socialLinks(await loadSocials(p.bioguideId));
      const chips = [];
      if (site) chips.push(`<a class="fact" href="${esc(site)}" target="_blank" rel="noopener noreferrer">🏛️ Official site</a>`);
      for (const [label, url] of socials)
        chips.push(`<a class="fact" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`);
      el.innerHTML = chips.length
        ? `<div class="facts">${chips.join("")}</div>
           <div class="src">Official site: Congress.gov · Social: @unitedstates/congress-legislators (public)</div>`
        : `<div class="meta">No web presence found for this member.</div>`;
    }

    // Bills currently in Congress (separate endpoint; same API).
    (async () => {
      let data;
      try { const r = await fetch("/api/bills"); data = r.ok ? await r.json() : null; } catch (_) {}
      const el = document.getElementById("bills");
      if (!data || !(data.bills || []).length) { el.textContent = "No bills loaded."; return; }
      el.innerHTML = data.bills.map(b => `
        <a class="item" style="display:block;text-decoration:none;color:inherit" href="./bill.html?congress=${esc(b.congress)}&type=${esc(b.type)}&number=${esc(b.number)}">
          <span class="date">${fmt(b.latestAction && b.latestAction.actionDate)}</span><span class="bill">${esc(b.type)} ${esc(b.number)} (${esc(b.congress)}th)${b.originChamber ? " · " + esc(b.originChamber) : ""} · see who voted →</span>
          <div class="title">${esc(b.title)}</div>
          ${b.latestAction ? `<div class="action">${esc(b.latestAction.text)}</div>` : ""}
        </a>`).join("") +
        `<div class="src">${data.live === false ? "Demo data — set CONGRESS_API_KEY for live bills. " : ""}Source: Congress.gov</div>`;
    })();
  </script>
</body>
</html>
