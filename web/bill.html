<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Politics — Bill vote</title>
  <style>
    :root { --ink:#1a1a2e; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; --yea:#15803d; --nay:#b91c1c; }
    * { box-sizing:border-box; }
    body { font-family:-apple-system, system-ui, sans-serif; margin:0; background:#f7f8fa; color:var(--ink); }
    .wrap { max-width:760px; margin:0 auto; padding:24px 16px 64px; }
    .brand { font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); font-weight:700; }
    a.back { display:inline-block; margin-top:6px; font-size:14px; color:var(--accent); text-decoration:none; }
    h1 { margin:.3em 0 0; font-size:22px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-top:14px; }
    .rc-head { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .pill { font-size:12px; border-radius:999px; padding:4px 10px; border:1px solid var(--line); color:var(--muted); }
    .pill.yea { color:var(--yea); border-color:#bbf7d0; background:#f0fdf4; }
    .pill.nay { color:var(--nay); border-color:#fecaca; background:#fef2f2; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px; }
    @media (max-width:560px){ .cols { grid-template-columns:1fr; } }
    .col h3 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; margin:0 0 6px; }
    .col.y h3 { color:var(--yea); } .col.n h3 { color:var(--nay); }
    .mv { font-size:13px; padding:5px 0; border-bottom:1px solid var(--line); }
    .mv:last-child { border-bottom:0; }
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
    .D{background:#2563eb;} .R{background:#dc2626;} .I{background:#7c3aed;} .U{background:#9ca3af;}
    .meta { color:var(--muted); font-size:14px; margin-top:4px; }
    .src { color:var(--muted); font-size:12px; margin-top:16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Pocket Politics</div>
    <a class="back" href="./explore.html">← All members</a>
    <h1 id="title">Loading vote…</h1>
    <div class="meta" id="meta"></div>
    <div id="rolls"></div>

    <div class="brand" style="margin-top:26px">Voter comments</div>
    <div class="card">
      <div class="meta" style="margin-top:0">Share your view on this bill. Public &amp; unverified — registered-voter verification is coming.</div>
      <form id="cform" style="margin-top:12px;display:grid;gap:8px">
        <input id="cauthor" placeholder="Your name (optional)" maxlength="60"
          style="padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px" />
        <textarea id="ctext" placeholder="Your comment on this bill…" maxlength="2000" rows="3" required
          style="padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit"></textarea>
        <button type="submit" style="justify-self:start;background:var(--accent);color:#fff;border:0;border-radius:9px;padding:9px 16px;font-size:14px;cursor:pointer">Post comment</button>
      </form>
      <div id="clist" style="margin-top:14px"></div>
    </div>

    <div class="src" id="src"></div>
  </div>
  <script>
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const pc = p => /^D/i.test(p) ? "D" : /^R/i.test(p) ? "R" : /^I/i.test(p) ? "I" : "U";
    const qp = new URLSearchParams(location.search);
    const congress = qp.get("congress") || "118", type = qp.get("type") || "hr", number = qp.get("number") || "1";

    function mlist(members) {
      return members.map(m =>
        `<div class="mv"><span class="dot ${pc(m.party)}"></span>${esc(m.name)} <span style="color:var(--muted)">${esc(m.party)}-${esc(m.state)}</span></div>`
      ).join("") || `<div class="mv" style="color:var(--muted)">—</div>`;
    }

    (async () => {
      let d;
      try { d = await (await fetch(`/api/votes?congress=${congress}&type=${type}&number=${number}`)).json(); }
      catch (e) { document.getElementById("title").textContent = "Could not load vote."; return; }
      document.getElementById("title").textContent = (d.bill || `${type.toUpperCase()} ${number}`) + " — votes";
      const rolls = d.rollCalls || [];
      document.getElementById("meta").textContent = rolls.length
        ? `${rolls.length} recorded roll call${rolls.length > 1 ? "s" : ""}` + (d.live === false ? " · demo data" : "")
        : "No recorded votes found for this bill.";
      document.getElementById("rolls").innerHTML = rolls.map(rc => {
        const yea = rc.members.filter(m => /^Yea|^Aye|^Yes/i.test(m.vote));
        const nay = rc.members.filter(m => /^Nay|^No/i.test(m.vote));
        const other = rc.members.filter(m => !/^Yea|^Aye|^Yes|^Nay|^No/i.test(m.vote));
        const t = rc.totals || {};
        const totalPills = Object.keys(t).map(k => `<span class="pill ${/^Yea/i.test(k)?'yea':/^Nay/i.test(k)?'nay':''}">${esc(k)}: ${t[k]}</span>`).join("");
        return `<div class="card">
          <div class="rc-head">
            <strong>${esc(rc.chamber)} · Roll ${esc(rc.rollNumber)}</strong>
            ${rc.result ? `<span class="pill">${esc(rc.result)}</span>` : ""}
            ${rc.date ? `<span class="pill">${esc(rc.date)}</span>` : ""}
          </div>
          <div style="margin-top:8px">${totalPills}</div>
          ${rc.members.length ? `<div class="cols">
            <div class="col y"><h3>Yea (${yea.length})</h3>${mlist(yea)}</div>
            <div class="col n"><h3>Nay (${nay.length})</h3>${mlist(nay)}</div>
          </div>${other.length ? `<div class="col"><h3>Other (${other.length})</h3>${mlist(other)}</div>` : ""}`
          : `<div class="meta" style="margin-top:8px">Per-member positions not available for this chamber yet (Senate needs LIS XML).</div>`}
        </div>`;
      }).join("");
      document.getElementById("src").textContent = "Source: Congress.gov house-vote / House Clerk roll calls";
    })();

    // ── Voter comments ──
    const billId = `${congress}-${type}-${number}`.toLowerCase();
    function renderComments(list) {
      const el = document.getElementById("clist");
      el.innerHTML = (list || []).length
        ? list.map(c => `<div class="mv"><strong>${esc(c.author)}</strong>
            <span style="color:var(--muted)">· ${new Date(c.ts).toLocaleDateString()}</span>
            <div>${esc(c.text)}</div></div>`).join("")
        : `<div class="meta">No comments yet — be the first.</div>`;
    }
    async function loadComments() {
      try { const d = await (await fetch(`/api/comments?bill=${encodeURIComponent(billId)}`)).json(); renderComments(d.comments); }
      catch (_) { document.getElementById("clist").innerHTML = `<div class="meta">Comments unavailable.</div>`; }
    }
    document.getElementById("cform").addEventListener("submit", async (e) => {
      e.preventDefault();
      const author = document.getElementById("cauthor").value;
      const text = document.getElementById("ctext").value.trim();
      if (!text) return;
      try {
        const d = await (await fetch("/api/comments", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bill: billId, author, text }),
        })).json();
        if (d.comments) { renderComments(d.comments); document.getElementById("ctext").value = ""; }
      } catch (_) {}
    });
    loadComments();
  </script>
</body>
</html>
